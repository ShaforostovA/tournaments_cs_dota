services:
  db:
    image: postgres:16-alpine
    container_name: tournaments_db
    environment:
      POSTGRES_USER: tournaments
      POSTGRES_PASSWORD: tournaments # pragma: allowlist secret
      POSTGRES_DB: tournaments
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tournaments -d tournaments"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tournaments_api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://tournaments:tournaments@db:5432/tournaments?sslmode=disable" # pragma: allowlist secret
      FRONTEND_URL: "http://localhost:3000"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "Lax"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tournaments_web
    environment:
      API_URL: "http://api:8080"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: tournaments_migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://tournaments:tournaments@db:5432/tournaments?sslmode=disable", # pragma: allowlist secret
        "up"
      ]

volumes:
  db_data:
