repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace

      - id: end-of-file-fixer
        name: Fix end of files

      - id: check-yaml
        name: Check YAML syntax

      - id: check-json
        name: Check JSON syntax

      - id: check-added-large-files
        name: Check large files
        args: ["--maxkb=1024"]

      - id: detect-private-key
        name: Detect private keys

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args:
          - "--exclude-files"
          - "package-lock.json|yarn.lock|pnpm-lock.yaml"

  - repo: local
    hooks:
      - id: gofmt
        name: Go formatting
        entry: gofmt -w
        language: system
        files: ^api/.*\.go$

      - id: go-vet
        name: Go vet
        entry: python -c "import os, subprocess; os.chdir('api'); subprocess.check_call(['go', 'vet', './...'])"
        language: system
        pass_filenames: false
        files: ^api/.*\.go$

      - id: frontend-lint
        name: Frontend lint
        entry: python -c "import os, subprocess, shutil; os.chdir('web'); npm = shutil.which('npm') or shutil.which('npm.cmd'); subprocess.check_call([npm, 'run', 'lint', '--if-present', '--', '--quiet'])"
        language: system
        pass_filenames: false
        files: ^web/.*\.(js|jsx|ts|tsx)$
