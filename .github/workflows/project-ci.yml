name: Project CI Optimized

on:
  pull_request:
    branches:
      - master
      - main

  push:
    branches:
      - master
      - main
      - devops/ci-cd-optimization

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shaforostova/tournaments-cs-dota-api
  GO_VERSION: "1.25.10"
  NODE_VERSION: "20"

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum

      - name: Check Go formatting
        working-directory: api
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        working-directory: api
        run: go vet ./...

  lint-web:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package-lock.json', 'web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Run frontend lint
        working-directory: web
        run: npm run lint

  test:
    name: Test (${{ matrix.suite }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: validation
            command: go test ./internal/validation -v
          - suite: backend-all
            command: go test ./... -count=1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run tests
        working-directory: api
        run: ${{ matrix.command }}

  security-sast:
    name: Security SAST
    runs-on: ubuntu-latest
    needs:
      - lint-go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec SAST scan
        working-directory: api
        run: |
          gosec -no-fail -fmt=json -out=gosec-report.json ./...

      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: api/gosec-report.json

  security-sca:
    name: Security SCA
    runs-on: ubuntu-latest
    needs:
      - lint-go
      - lint-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go with cache
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run Go dependency vulnerability scan
        working-directory: api
        run: govulncheck ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package-lock.json', 'web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Run npm audit
        working-directory: web
        run: npm audit --audit-level=high --omit=dev

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - security-sast
      - security-sca

    steps:
      - name: Check security results
        run: |
          echo "Checking security results..."

          if [ "${{ needs.security-sast.result }}" != "success" ]; then
            echo "SAST failed"
            exit 1
          fi

          if [ "${{ needs.security-sca.result }}" != "success" ]; then
            echo "SCA failed"
            exit 1
          fi

          echo "Security checks passed"

  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs:
      - test
      - security-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
